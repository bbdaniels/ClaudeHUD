name: ClaudeHUD
options:
  bundleIdPrefix: com.claudehud
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  ClaudeHUD:
    type: application
    platform: macOS
    sources:
      - path: ClaudeHUD
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudehud.app
        PRODUCT_NAME: ClaudeHUD
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: ClaudeHUD/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeHUD/Resources/ClaudeHUD.entitlements
        CODE_SIGN_IDENTITY: "-"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
