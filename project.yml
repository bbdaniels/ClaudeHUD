name: ClaudeHUD
options:
  bundleIdPrefix: com.claudehud
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  ClaudeHUD:
    type: application
    platform: macOS
    sources:
      - path: ClaudeHUD
        excludes:
          - "**/*.entitlements"
    resources:
      - path: ClaudeHUD/Resources/ntfy-notify.sh
    dependencies:
      - framework: ClaudeHUD/Vendor/Ghostty/GhosttyKit.xcframework
        embed: false
        link: true
      - sdk: GameController.framework
      - sdk: MetalKit.framework
      - sdk: Carbon.framework
      - sdk: UserNotifications.framework
      - sdk: CoreText.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudehud.app
        PRODUCT_NAME: ClaudeHUD
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: ClaudeHUD/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeHUD/Resources/ClaudeHUD.entitlements
        CODE_SIGN_IDENTITY: "ClaudeHUD Dev"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_DEBUG_DYLIB: NO
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @executable_path/../Frameworks
        SWIFT_OBJC_BRIDGING_HEADER: ClaudeHUD/Vendor/GhosttySurface/ClaudeHUD-Bridging-Header.h
        OTHER_LDFLAGS: >-
          $(inherited) -lc++ -Wl,-ld_classic
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libghostty.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libdcimgui.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libfreetype.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/liboniguruma.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libintl.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libz.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libsimdutf.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libpng.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libhighway.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libspirv_cross.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libglslang.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libsentry.a
          -Wl,-force_load,$(SRCROOT)/ClaudeHUD/Vendor/Ghostty/libbreakpad.a
