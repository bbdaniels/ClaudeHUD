name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -scheme ClaudeHUD -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/ClaudeHUD.app"
          cd "$(dirname "$APP_PATH")"
          zip -r ClaudeHUD.app.zip ClaudeHUD.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/ClaudeHUD.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
