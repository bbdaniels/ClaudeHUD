name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install Zig 0.15.2
        run: brew install zig@0.15

      - name: Cache Ghostty build
        id: ghostty-cache
        uses: actions/cache@v4
        with:
          path: |
            ClaudeHUD/Vendor/Ghostty/*.a
            ClaudeHUD/Vendor/Ghostty/GhosttyKit.xcframework
          key: ghostty-v1.3.1-${{ runner.os }}-${{ hashFiles('scripts/bootstrap-ghostty.sh') }}

      - name: Bootstrap Ghostty
        if: steps.ghostty-cache.outputs.cache-hit != 'true'
        run: scripts/bootstrap-ghostty.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -scheme ClaudeHUD -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release/ClaudeHUD.app"
          cd "$(dirname "$APP_PATH")"
          zip -r ClaudeHUD.app.zip ClaudeHUD.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Build/Products/Release/ClaudeHUD.app.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
